name: Code quality
permissions:
  contents: read
on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Setup Biome
        uses: biomejs/setup-biome@a05c02a1304287da45f13648675a70d5841acdbc
        with:
          version: 2.2.6
      - name: Run Biome
        run: biome ci .
